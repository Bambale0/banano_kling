              description: Имя получателя
            middle_name:
              type: string
              description: Отчество получателя
            last_name:
              type: string
              description: Фамилия получателя
          nullable: true
        act:
          type: object
          description: Данные для создания акта по выплате
          properties:
            document_number:
              description: Номер документа
              type: string
              example: №123
            document_date:
              description: Дата создания документа
              type: string
              example: '2022-08-11'
            period_from:
              description: Дата начала выполнения работ
              type: string
              example: '2022-08-11'
            period_to:
              description: Дата окончания выполнения работ
              type: string
              example: '2022-09-11'
            template_id:
              description: Идентификатор шаблона акта
              type: integer
              example: 1
              nullable: true
            job_types:
              description: Виды работ
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                    description: Название вида работ
                    example: Тестовое задание
                  price:
                    type: number
                    description: Цена
                    example: 112.4
                  count:
                    type: integer
                    description: Количество
                    example: 3
                  measure_id:
                    type: integer
                    description: 'Единица измерения: 1 - час, 2 - штука, 3 - услуга '
                    example: 2
          nullable: true
        fix_commission:
          type: number
          description: удержание фиксированное(не больше суммы выплаты)
          nullable: true
          example: 150
        percent_commission:
          type: number
          description: удержание в процентах
          nullable: true
          example: 10
        with_decrease_contractor_balance:
          type: boolean
          description: списание с баланса исполнителя
          nullable: true
          example: true
        currency_operation_code:
          type: string
          description: код валютной операции
          nullable: true
          example: 20200

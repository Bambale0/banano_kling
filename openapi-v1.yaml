        id:
          type: string
          description: Ид производственного календаря
        name:
          type: string
          description: Название производственного календаря
        code:
          type: string
          description: Код производственного календаря
      required:
        - id
        - name
        - code
    Requisites:
      type: object
      description: Значения реквизитов получателя
      anyOf:
        - title: СБП по номеру телефона
          description: >-
            Если реквизит еще не существует, будет создан новый. Если не передан
            requisite_id, то является обязательным
          properties:
            type_id:
              type: integer
              description: Ид типа реквизита (для СБП нужно указать значение 10)
            account_number:
              type: string
              description: Номер телефона получателя
            sbp_bank_id:
              type: integer
              description: Ид банка в системе СБП
        - title: Карта банка по номеру карты
          description: >-
            Карта банка по номеру карты. Если реквизит еще не существует будет
            создан новый. Если не передан requisite_id или card->uuid, то
            является обязательным.
          properties:
            type_id:
              type: integer
              description: >-
                Ид типа реквизита (для банковской карты нужно указать значение
                8)
            account_number:
              type: string
              description: Номер банковской карты получателя
        - title: Карта банка по uuid карты
          description: >-
            Карта банка по uuid карты. Если реквизит еще не существует будет
            создан новый. Если не передан requisite_id или account_number, то
            является обязательным.
          properties:
            type_id:
              type: integer
              description: >-
                Ид типа реквизита (для банковской карты нужно указать значение
                8)
            card:
              properties:
                uuid:
                  type: string
                  description: Уникальный идентификатор карты
        - title: На расчетный счет по номеру счета
          description: >-
            На расчетный счет по номеру счета. Если реквизит еще не существует
            будет создан новый.
          properties:
            type_id:
              type: integer
              description: Ид типа реквизита (для расчетного нужно указать значение 12)
            account_number:
              type: string
              description: Номер расчетного счета
            bik:
              type: string
              description: Бик банка
            inn:
              type: string
              description: Инн
              nullable: true
    WithdrawSmartViaOpenApiRequest:
      type: object
      properties:
        customer_payment_id:
          type: string
          description: >-
            Идентификатор выплаты в системе клиента. Идентификатор не должен
            содержать номер карты. Два платежа с одним и тем же идентификатором
            не могут быть созданы в системе. Идентификатор может содержать
            только латинские буквы, цифры, пробелы и символы
            -_.!:*()[]@$~`^,;=<>|{}‘.
          maxLength: 36
        phone:
          type: string
          description: Номер телефона получателя
        last_name:
          type: string
          description: Фамилия получателя
        first_name:
          type: string
          description: Имя получателя
        middle_name:
          type: string
          description: Отчество получателя
        requisite:
          $ref: '#/components/schemas/Requisites'
        amount:
          type: number
          description: Сумма выплаты
        agent_id:
          type: integer
          description: ИД юр.лица
        ext_template:
          type: string
          description: Имя внешнего шаблона
        ext_contract_number:
          type: string
          description: Номер внешнего договора
        ext_contract_date:
          type: string
          format: date-time
          description: Дата внешнего договора
        ext_vin:
          type: string
          description: VIN номер
        bank_account_id:
          type: integer
          description: >-
            Идентификатор счета, с которого будет произведена выплата. Если не
            передан - будет использован счет по умолчанию для данного типа
            реквизитов исполнителя
        sbp_validation_data:
          type: object
          description: Данные для проверки в случае выплаты по СБП
          properties:
            first_name:
              type: string
              description: Имя получателя
            middle_name:
              type: string
              description: Отчество получателя
            last_name:
              type: string
              description: Фамилия получателя
          nullable: true
        branch_office_id:
          nullable: true
          type: integer
          description: Идентификатор филиала с которого была создана выплата
        currency_operation_code:
          type: string
          description: код валютной операции
          nullable: true
          example: 20200
      required:
        - phone
        - last_name
        - first_name
        - requisite
        - amount
        - customer_payment_id
    PassportRFVerificationRequest:
      type: object
      required:
        - last_name
        - first_name
        - phone_number
        - is_self_employed
        - birth_date
        - citizenship
        - passport
      properties:
        last_name:
          type: string
          example: Иванов
        first_name:
          type: string
          example: Ивано
        middle_name:
          type: string
          nullable: true
          example: Иванович
        phone_number:
          type: string
          example: '+79990000000'
        is_self_employed:
          type: boolean
          example: false
        birth_date:
          type: string
          example: '2000-01-01'
        citizenship:
          type: string
          enum:
            - RU
        inn:
          type: string
          nullable: true
          example: '000000000000'
        passport:
          type: object
          required:
            - type
            - registration_address
            - serial
            - number
            - issue_date
            - division
            - issued_by
          properties:
            type:
              type: string
              enum:
                - passport_rf
            registration_address:
              type: string
              example: г. Москва, Ленинский проспект, д. 1
            serial:
              type: string
              example: '1234'
            number:
              type: string
              example: '123456'
            issue_date:
              type: string
              example: '2000-01-01'
            division:
              type: string
              example: 000-000
            issued_by:
              type: string

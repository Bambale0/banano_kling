  /astral/subscribers/issue-requests:
    post:
      tags:
        - Провайдеры подписей
      operationId: signature-providers-create-astral-subscribers-issue-request
      description: >-
        Создает запрос на выпуск УНЭП штатным сотрудникам, подпадающим под
        выборку фильтра. Если поле ИД сотрудников в фильтре отсутствует, будет
        считаться, что в выборку должны попасть все штатные сотрудники компании.
        УНЭП будут выпущены только тем сотрудникам, которые еще не имеют УНЭП и
        данных по которым достаточно для выпуска.
      summary: Создать запрос на выпуск УНЭП
      responses:
        '204':
          description: OK
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '422':
          $ref: '#/components/responses/422UnprocessableEntity'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                identification_type:
                  type: string
                  description: >-
                    Способ идентификации сотрудниками, для которых нужно
                    выпустить УНЭП
                  enum:
                    - personal
                    - epgu
                filter:
                  type: object
                  properties:
                    employee_id:
                      type: array
                      description: >-
                        Массив ИД штатных сотрудников, для которых нужно
                        выпустить УНЭП
                      items:
                        type: integer
              required:
                - identification_type

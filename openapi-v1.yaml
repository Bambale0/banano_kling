openapi: 3.0.0
info:
  title: Jump.Finance OpenApi
  version: '2.0'
  contact:
    name: Jump.Finance
    email: support@jump.finance
    url: https://jump.finance/kontakty
  description: >
    # Введение

    **Jump.Finance OpenApi** — продукт, позволяющий вам организовать
    взаимодйствие с сервисом Jump.Finance из своей системы.


    **Возможности:**

    - управление юрлицами для работы с исполнителями через разные юридические
    лица и банковские счета

    - управление исполнителями

    - создание выплат и получение информации по выплатам

    - получение информации по банковским счетам

    ## Общая информация

    Номер телефона всегда передается в формате '+70000000000'


    В каждом запросе должны быть заголовки:

    - Accept: application/json

    - Content-Type: application/json

    ## Авторизация

    Для авторизации необходимо передать ключ клиента. Ключ можно передать двумя
    способами:


    ```GET-параметр client_key```

     ```заголовок Client-Key```
    ## Правовые формы

    Все исполнители имеют правовую форму **legal_form_id**.


    Доступные значения:



    - 1 - физическое лицо


    - 2 - самозанятый


    - 3 - ип


    ## Статусы выплат

    Все выплаты имеют текущий статус **status_id**.


    Доступные значения:



    - 1 - оплачен (без возможности дальнейших действий)


    - 2 - отклонён (без возможности дальнейших действий)


    - 3 - в обработке (ждём проведение через платежные системы)


    - 4 - ожидает оплаты (требуется запустить оплату в ЛК)


    - 5 - ошибка выплаты (с возможностью повторить действие, отменить выплату
    или зачислить средства на баланс исполнителя)


    - 6 - удалено (без возможности дальнейших действий)


    - 7 - ожидает подтверждения (требуется подтвердить выплату в ЛК)


    - 8 - ждет подписания акта (ожидает подписания акта)


    ## Ошибки

    **401 Unauthorized** - ошибка авторизации


    ```

    {
      "error": {
        "title": "Ошибка авторизации",
        "detail": "Требуется авторизация",
        "fields": null,
        "code": 401
      }
    }

    ```


    **403 Forbidden** - ошибка доступа


    ```

    {
      "error": {
        "title": "Доступ ограничен",
        "detail": "This action is unauthorized.",
        "fields": null,
        "code": 403
      }
    }

    ```


    **404 Not Found** - ресурс не найден


    ```

    {
      "error": {
        "title": "Ошибка",
        "detail": "Ресурс не найден",
        "fields": null,
        "code": 404
      }
    }

    ```


    **422 Unprocessable Entity** - ошибка валидации


    ```

    {
      "error": {
        "title": "Ошибка",
        "detail": "The given data was invalid.",
        "fields": [
          {
            "field": "name",
            "messages": [
              "Поле Название обязательно для заполнения."
            ]
          },
          {
            "field": "inn",
            "messages": [
              "Поле ИНН обязательно для заполнения."
            ]
          }
        ],
        "code": 422
      }

    }

    ```


    **500 Internal Server Error** - неизвестная ошибка


    ```

    {
      "error": {
        "title": "Ошибка",
        "detail": "Внутренняя ошибка сервера",
        "fields": null,
        "code": 500
      }
    }

    ```
  termsOfService: https://jump.finance/rules/

  /payments:
    post:
      servers:
        - url: https://api.jump.finance/services/openapi
      tags:
        - Выплаты
      summary: Создать выплату
      operationId: postPaymentsStore
      description: >
        По умолчанию мы создаем выплату от юрлица, которому принадлежит
        исполнитель.

        Вы можете переопределить это поведение, явно передав идентификатор
        юрлица в параметре agent_id.

        Для компаний, поддерживающих работу с несколькими балансами
        исполнителей, если передан balance_id,

        то выплата будет создана на юрлицо переданного баланса, и переопредилить
        юрлицо у выплаты будет нельзя.

        Зачисление денежных средств осуществляется только на банковские карты,
        выпущенные в РФ.

        Если не передать ни requisite_id, ни requisite, то при создании выплаты
        будет использоваться реквизит исполнителя по умолчанию.

        Результат запроса на выплату можно получить, вызвав метод <a
        href="#operation/getPaymentsShow">Получить информацию по выплате</a>,

        передав в него соответствующий payment_id.

        Поля в запросе не должны содержать номер банковской карты, кроме поля
        account_number в requesite.
      requestBody:
        description: Создает новую выплату
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentStoreRequest'
            examples:
              Карта банка по номеру карты:
                value:
                  requisite:
                    type_id: 8
                    account_number: '5469550053219652'
                  contractor_id: 123
                  amount: 100
                  agent_id: 61
                  service_name: >-
                    наименование услуг. Не должно содержать номер банковской
                    карты. Доступно 150 символов.
                  payment_purpose: >-
                    назначение платежа для банковской выписки. Не должно
                    содержать номер банковской карты. Доступно для выплат по
                    номеру карты 125 символов
                  customer_payment_id: 9f0bb7b7-e5cd-4725-8080-4c230ec702ad
              Карта банка по uuid карты:
                value:
                  requisite:
                    type_id: 8
                    card:
                      uuid: 01975965-e1cf-7ff8-05bc-a8f041d27440
                  contractor_id: 123
                  amount: 100
                  agent_id: 61
                  service_name: >-
                    наименование услуг. Не должно содержать номер банковской
                    карты. Доступно 150 символов.
                  payment_purpose: >-
                    назначение платежа для банковской выписки. Не должно
                    содержать номер банковской карты. Доступно для выплат по
                    номеру карты 125 символов
                  customer_payment_id: 9f0bb7b7-e5cd-4725-8080-4c230ec702ad
              Карта банка по номеру телефона:
                value:
                  requisite:
                    type_id: 10
                    account_number: '+79031112233'
                    sbp_bank_id: 100000000004
                  contractor_id: 123
                  amount: 100
                  agent_id: 61
                  balance_id: 1
                  customer_payment_id: 9f0bb7b7-e5cd-4725-8080-4c230ec702ad
                  service_name: >-
                    наименование услуг. Не должно содержать номер банковской
                    карты. Доступно 150 символов.
                  payment_purpose: >-
                    назначение платежа для банковской выписки. Не должно
                    содержать номер банковской карты. Доступно для выплат по
                    номеру телефона – 109 символов.
              На расчетный счет по номеру счета:
                value:
                  requisite:
                    type_id: 12
                    account_number: '40802911411111517557'
                    bik: '044525974'
                    inn: '525341624343'
                  contractor_id: 123
                  amount: 100
                  agent_id: 61
                  service_name: >-
                    наименование услуг. Не должно содержать номер банковской
                    карты. Доступно 150 символов.
                  payment_purpose: >-
                    назначение платежа для банковской выписки. Не должно
                    содержать номер банковской карты. Доступно для выплат по
                    номеру карты 125 символов
                  customer_payment_id: 9f0bb7b7-e5cd-4725-8080-4c230ec702ad
              Существующий реквизит:
                value:
                  contractor_id: 123
                  amount: 100
                  agent_id: 61
                  requisite_id: 234
                  customer_payment_id: 9f0bb7b7-e5cd-4725-8080-4c230ec702ad
      responses:
        '200':
          description: Создание выплаты
          content:
            application/json:
              schema:
                type: object
                properties:
                  item:
                    $ref: '#/components/schemas/Payment'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '422':
          description: Ошибка валидации
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ErrorResponse'
                  - type: object
                    properties:
                      error:
                        type: object
                        properties:
                          reason_code:
                            type: string
                            description: >-
                              Доболнительная информация об ошибке. Возможные
                              значения: VALIDATION_ERROR - Ошибка валидации
                              данных, PAYMENT_RESTRICTION - Ограничение на
                              проведение платежа, BANK_ACCOUNT_ERROR -
                              Некорректный банковский счет, DOCUMENT_ERROR - Не
                              подписаны документы исполнителем, BRANCH_ERROR -
                              Некорректный филиал, AMOUNT_ERROR - Некорректная
                              сумма, INSUFFICIENT_BALANCE - Недостаточно средств
                              на счете, LIMIT_EXCEEDED - Превышен лимит
                              операции, AGENT_ERROR - Некорректное юр. лицо,
                              SBP_DATA_ERROR - Ошибка данных для СБП,
                              UNKNOWN_ERROR - Неизвестная ошибка
                            example: VALIDATION_ERROR
              example:
                error:
                  title: Ошибка
                  detail: The given data was invalid.
                  fields:
                    - field: name
                      messages:
                        - Поле Название обязательно для заполнения.
                    - field: inn
                      messages:
                        - Поле ИНН обязательно для заполнения.
                  code: 422
                  reason_code: VALIDATION_ERROR
        '429':
          $ref: '#/components/responses/429TooManyRequests'
    get:
      tags:
        - Выплаты
      summary: Получить все выплаты
      description: Возвращает все выплаты
      operationId: getPaymentsIndex
      parameters:
        - name: include
          in: query
          description: >
            Дополнительно к существующим полям можно запросить дополнительную
            информацию по выплате. Поля передаются через запятую:
            include=requisite,creator


            - **abilities** - возможность совершения действий над выплатой

            - **requisite** - реквизиты, по которым выплата была произведена

            - **creator** - создатель выплаты

            - **agent** - юрлицо, в рамках которого выплата осуществлена

            - **history** - история действий по выплате

            - **payload** - дополнительные клиентские данные о выплате, например
            данные, введенные на форме при создании: тип договора, его номер и
            т.д.

            - **act** - информация о связанном с выплатой акте (если есть)

            - **nominal_info** - информация, связанная с номинальным счетом

            - **comment** - комментарий к выплате
          schema:
            type: string
        - name: status_id
          in: query
          schema:
            type: number
            example: '1'
          description: Фильтр по статусу выплаты (см. раздел 'Статусы выплат')
        - name: agent_id
          in: query
          schema:
            type: string
            example: 61,51,88
          description: Фильтр по юр.лицам
        - name: contractor_id
          in: query
          schema:
            type: string
            example: 111556,111558
          description: Фильтр по id исполнителей
        - name: amount_gte
          in: query
          schema:
            type: number
            example: 101
          description: Минимальная сумма выплаты (заявка)
        - name: amount_lte
          in: query
          schema:
            type: number
            example: 204
          description: Максимальная сумма выплаты (заявка)
        - name: amount_paid_gte
          in: query
          schema:
            type: number
            example: 101
          description: Минимальная сумма выплаты (полученная исполнителем)
        - name: amount_paid_lte
          in: query
          schema:
            type: number
            example: 204
          description: Максимальная сумма выплаты (полученная исполнителем)
        - name: created_at_from
          schema:
            type: string
          in: query
          required: false
          description: 'Начало периода создания выплаты. Формат: YYYY-MM-DDTHH:mm:ss±hh:mm'
          example: '2025-10-15T00:00:00+00:00'
        - name: created_at_to
          schema:
            type: string
          in: query
          required: false
          description: 'Конец периода создания выплаты. Формат: YYYY-MM-DDTHH:mm:ss±hh:mm'
          example: '2025-10-15T00:00:00+00:00'
        - name: search
          schema:
            type: string
            example: Василий
          in: query
          description: Поиск по ФИО исполнителя, номеру телефона исполнителя, и id выплаты
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/per_page'
      responses:
        '200':
          description: Получение всех выплат
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      allOf:
                        - $ref: '#/components/schemas/Payment'
                        - type: object
                          properties:
                            abilities:
                              nullable: true
                              type: object
                              properties:
                                can_approve:
                                  type: boolean
                                  description: >-
                                    У пользователя есть право на подтверждение
                                    выплаты
                                  example: true
                                can_confirm:
                                  type: boolean
                                  description: >-
                                    У пользователя есть право на исполнение
                                    выплаты
                                  example: true
                                can_repeat:
                                  type: boolean
                                  description: >-
                                    У пользователя есть право на повторное
                                    исполнение выплаты
                                  example: true
                                can_refund:
                                  type: boolean
                                  description: У пользователя есть право на возврат выплаты
                                  example: true
                                can_cancel:
                                  type: boolean
                                  description: У пользователя есть право на отмену выплаты
                                  example: true
                                can_add_files:
                                  type: boolean
                                  description: >-
                                    У пользователя есть право на добавление
                                    файлов к выплате
                                  example: true
                                can_edit:
                                  type: boolean
                                  description: >-
                                    У пользователя есть право на редактирование
                                    выплаты
                                  example: true
                                can_edit_requisite:
                                  type: boolean
                                  description: >-
                                    У пользователя есть право на редактирование
                                    реквизитов
                                  example: true
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
                  links:
                    $ref: '#/components/schemas/PaginationLinks'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '429':
          $ref: '#/components/responses/429TooManyRequests'

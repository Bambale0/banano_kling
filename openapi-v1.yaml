              description: >-
                1xxxx - группа системных ошибок; 2xxxx - группа ошибок
                пользователя; 3xxxx - группа ошибок исполнителя. 10001 -
                Неизвестная ошибка, 10002 - Ошибка проведения платежа. Повторите
                позже, 10004 - Банк получателя отказал в приеме платежа, 10005 -
                Платеж отклонен по подозрению на мошенничество, 10006 - Операция
                запрещена, 10007 - Операция по СБП недоступна, 10008 -
                Недостаточно данных для проведения платежа, 10009 - Ошибка
                проведения платежа. Обратитесь в поддержку, 10010 – Операция по
                выплате уже была инициализирована. Обратитесь в поддержку, 20001
                - Недостаточно средств на счете компании, 20002 - Неверно
                указано юрлицо, 20003 - Неверно указана услуга, 20004 - Превышен
                лимит по операции, 20005 - Неверная карта отправителя, 20006 -
                Неверно указаны реквизиты отправителя, 20007 - Некорректная
                сумма, 30001 - Выплата отклонена. Измените реквизиты и повторите
                операцию, 30002 - Выплата отклонена. Необходимо воспользоваться
                картой российского банка, 30003 - Выплата отклонена. Срок
                действия карты истек, 30004 - Необходимо подключить СБП в
                мобильном банке, либо выбрать банк, к которому привязан номер
                мобильного телефона, 30005 - ФИО получателя не совпадает с
                реквизитами СБП, 30006 - У получателя нет счета в банке, 30007 -
                Неверный номер телефона
              enum:
                - 10001
                - 10002
                - 10003
                - 10004
                - 10005
                - 10006
                - 10007
                - 10008
                - 10009
                - 10010
                - 20001
                - 20002
                - 20003
                - 20004
                - 20005
                - 20006
                - 20007
                - 30001
                - 30002
                - 30003
                - 30004
                - 30005
                - 30006
                - 30007
                - 31001
                - 31002
                - 31003

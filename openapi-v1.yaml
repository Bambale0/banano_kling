    parameters: []
    post:
      summary: Создать документ
      operationId: postDocumentsStore
      responses:
        '200':
          description: OK
          headers: {}
          content:
            application/json:
              schema:
                type: object
                properties:
                  item:
                    $ref: '#/components/schemas/Document'
                required:
                  - item
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '422':
          $ref: '#/components/responses/422UnprocessableEntity'
        '429':
          $ref: '#/components/responses/429TooManyRequests'
      description: Создаёт документ
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                external_id:
                  type: string
                  maxLength: 64
                  description: Внешний идентификатор (произвольная форма, уникальный)
                agent_id:
                  type: integer
                  description: ИД юрлица
                document_type_id:
                  type: integer
                  description: ИД типа документа
                sign_order:
                  $ref: '#/components/schemas/DocumentSignOrderEnum'
                name:
                  type: string
                  maxLength: 512
                  description: Название документа
                manual_series:
                  type: string
                  maxLength: 255
                  description: Серия документа
                manual_number:
                  type: string
                  maxLength: 255
                  description: Номер документа
                date:
                  type: string
                  maxLength: 50
                  description: Дата в документе (произвольный формат)
                  nullable: true
                manager_signatures:
                  type: array
                  description: Список подписей руководителей
                  items:
                    type: object
                    description: Подпись руководителя
                    properties:
                      user_id:
                        type: integer
                        description: ИД пользователя
                      user_position_id:
                        type: integer
                        description: ИД должности пользователя
                        nullable: true
                    required:
                      - user_id
                employee_signatures:
                  type: array
                  description: Список подписей сотрудников
                  items:
                    type: object
                    description: Подпись сотрудника
                    properties:
                      user_id:
                        type: integer
                        description: ИД пользователя
                      user_position_id:
                        type: integer
                        description: ИД должности пользователя
                        nullable: true
                    required:
                      - user_id
                author_id:
                  type: integer
                  description: ИД автора (пользователя) документа
                  nullable: true
                author_position_id:
                  type: integer
                  description: ИД должности автора (пользователя) документа
                  nullable: true
                signature_deadline:
                  type: string
                  format: date
                  description: Дедлайн подписания документа
                  nullable: true
                convert_to_pdf_a:
                  type: boolean
                  description: >-
                    Будет ли система конвертировать загружаемый документв в
                    PDF/A-1a
                file:
                  type: string
                  format: binary|base64
                  description: >-
                    Файл документа. Принимаемые форматы: doc,docx,pdf,xls,xlsx.
                    Максимальный размер 10МБ.
                file_name:
                  type: string
                  description: >-
                    Имя файла. Передается, когда в поле file передано значение в
                    base64
              required:
                - agent_id
                - document_type_id
                - sign_order
                - name
                - file
      tags:
        - Документы

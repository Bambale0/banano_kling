    post:
      tags:
        - Отпуска
      summary: Синхронизировать отпуска штатных сотрудников компании
      description: >-
        Метод позволяет передать график отпусков штатных сотрудников компании из
        внешней системы. Отсутствующие в сервисе отпуска будут добавлены, а
        присутствующие в сервисе, но отсутствующие в запросе – удалены из
        сервиса. Период синхронизации будет ограничен годом, указанным в
        запросе, поэтому следует присылать только отпуска за указанный год. В
        запросе нужно передавать не более 100 штатных сотрудников.
      operationId: syncVacations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VacationsSyncRequest'
      responses:
        '204':
          description: Данные для синхронизации успешно приняты
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '422':
          $ref: '#/components/responses/422UnprocessableEntity'

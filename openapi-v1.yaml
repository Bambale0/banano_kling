        customer_payment_id:
          type: string
          description: >-
            Идентификатор выплаты в системе клиента. Идентификатор не должен
            содержать номер карты. Два платежа с одним и тем же идентификатором
            не могут быть созданы в системе. Идентификатор может содержать
            только латинские буквы, цифры, пробелы и символы
            -_.!:*()[]@$~`^,;=<>|{}‘.
          maxLength: 36

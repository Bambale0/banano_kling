    PaymentStoreRequest:
      type: object
      description: Запрос на создание выплаты
      properties:
        requisite:
          description: >-
            Не указывается, если используется параметр requisite_id или
            требуется использовать реквизит по умолчанию
          anyOf:
            - description: >-
                Карта банка по номеру телефона. Если реквизит еще не существует
                будет создан новый. Если не передан requisite_id, то является
                обязательным.
              title: Карта банка по номеру телефона
              properties:
                type_id:
                  type: integer
                account_number:
                  type: string
                sbp_bank_id:
                  type: integer
            - description: >-
                Карта банка по номеру карты. Если реквизит еще не существует
                будет создан новый. Если не передан requisite_id или card->uuid
                , то является обязательным.
              title: Карта банка по номеру карты
              properties:
                type_id:
                  type: integer
                account_number:
                  type: string
            - description: >-
                Карта банка по uuid карты. Если реквизит еще не существует будет
                создан новый. Если не передан requisite_id или account_number,
                то является обязательным.
              title: Карта банка по номеру карты
              properties:
                type_id:
                  type: integer
                card:
                  type: object
                  properties:
                    uuid:
                      type: string
            - description: >-
                На расчетный счет по номеру счета. Если счет еще не существует
                будет создан новый.
              title: На расчетный счет по номеру счета
              properties:

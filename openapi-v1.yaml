    v1.VehicleMarketPrice:
      type: object
      description: Рыночная цена ТС относительно его пробега
      properties:
        price:
          $ref: '#/components/schemas/v1.Price'
        mileage:
          $ref: '#/components/schemas/v1.VehicleMileage'
    v1.MarketPrice:
      type: object
      description: Данные о рыночной цене ТС
      properties:
        actual_on:
          type: string
          format: date
          description: Дата в ISO8601, на которую актуальны данные в разделе отчета
        price_min:
          allOf:
            - type: object
              description: >-
                Минимальная цена ТС, рассчитанная на основе объявлений о продаже
                ТС
            - $ref: '#/components/schemas/v1.Price'
        price_max:
          allOf:
            - type: object
              description: >-
                Максимальная цена ТС, рассчитанная на основе объявлений о
                продаже ТС
            - $ref: '#/components/schemas/v1.Price'
        price_optimal:
          allOf:
            - type: object
              description: >-
                Оптимальная цена ТС, рассчитанная на основе объявлений о продаже
                ТС
            - $ref: '#/components/schemas/v1.Price'
        mileage:
          allOf:
            - type: object
              description: Пробег ТС, для которого сделан расчёт цены
            - $ref: '#/components/schemas/v1.VehicleMileage'
        related_ads_market_prices:
          type: array
          description: >-
            Список рыночных цен относительно пробега ТС в похожих объявлениях о
            продаже
          items:
            $ref: '#/components/schemas/v1.VehicleMarketPrice'
      required:
        - related_ads_market_prices
    v1.VehicleReportPartition:
      type: object
      description: Раздел отчета о ТС
      properties:
        type:
          type: string
          enum:
            - vehicle_passport
            - vehicle_owners
            - road_traffic_accidents
            - commercial_using
            - mileage_history
            - traffic_police_restrictions
            - wanted
            - leasing
            - ads
            - enforcement_proceedings
            - pledges
            - osago
            - recall_campaigns
            - fines
            - arbitration_cases
            - market_price
          description: Тип раздела
        name:
          type: string
          description: Название раздела на русском языке
        suggested_readiness_at:
          type: string
          format: date
          description: >-
            Дата и время предполагаемого момента готовности данных раздела в
            формате ISO8601
        is_ready:
          type: boolean
          description: Готовы ли данные раздела
        has_issues:
          type: boolean
          description: Есть ли негативные признаки в разделе
        data:
          description: >-
            Данные раздела отчета. Если значение этого поля равно null и при
            этом is_ready равно true, значит мы не смогли получить какие-либо
            данные по разделу от поставщика. В случае когда нам не известно
            значение поля данных раздела, этого поля не будет в ответе
          nullable: true
          anyOf:
            - $ref: '#/components/schemas/v1.VehiclePassport'
            - $ref: '#/components/schemas/v1.VehicleOwners'
            - $ref: '#/components/schemas/v1.RoadTrafficAccidents'
            - $ref: '#/components/schemas/v1.CommercialUsing'
            - $ref: '#/components/schemas/v1.MileageHistory'
            - $ref: '#/components/schemas/v1.TrafficPoliceRestrictions'
            - $ref: '#/components/schemas/v1.Wanted'
            - $ref: '#/components/schemas/v1.Leasing'
            - $ref: '#/components/schemas/v1.Ads'
            - $ref: '#/components/schemas/v1.EnforcementProceedings'
            - $ref: '#/components/schemas/v1.Pledges-2'
            - $ref: '#/components/schemas/v1.Osago'
            - $ref: '#/components/schemas/v1.RecallCampaigns'
            - $ref: '#/components/schemas/v1.Fines'
            - $ref: '#/components/schemas/v1.VehicleArbitrationCases'
            - $ref: '#/components/schemas/v1.MarketPrice'
      required:
        - type
        - name
        - suggested_readiness_at
        - is_ready
        - has_issues
        - data
    v1.VehicleReport:
      type: object
      description: Отчет о ТС
      properties:
        id:
          type: string
          description: ИД отчета о ТС
        suggested_partial_readiness_at:
          type: string
          format: date
          description: >-
            Дата и время предполагаемого момента частичной готовности отчета в
            формате ISO8601
        is_partially_ready:
          type: boolean
          description: Готов ли отчет частично
        readiness_progress:
          type: integer
          description: Прогресс готовности отчета в целых процентах
        partitions:
          type: array
          description: Разделы отчета
          items:
            $ref: '#/components/schemas/v1.VehicleReportPartition'
        url:
          type: string
          description: Сылка, по которой доступен отчет
        created_at:
          type: string
          format: date
          description: Дата и время создания отчета в формате ISO8601
      required:
        - id
  parameters:
    Device-Key:
      name: Device-Key
      in: header
      required: true
      schema:
        type: string
        example: 1234-4321-1122-3344
      description: Идентификатор устройства
    Application-Key:
      name: Application-Key
      in: header
      required: true
      schema:
        type: string
        example: f5a1da62-ebe0-4b6b-b0f9-1483f7d62adf
      description: Ключ приложения
    page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        format: int64
        minimum: 1
        default: 1
      description: Текущая страница
    per_page:
      name: per_page
      in: query
      required: false
      schema:
        type: integer
        format: int64
        maximum: 200
        enum:
          - 1
          - 2
          - 3
          - 4
          - 5
          - 10
          - 15
          - 20
          - 25
          - 30
          - 50
          - 100
          - 150
          - 200
        minimum: 1
        default: 20
      description: Количество элементов на странице
    employee_include:
      name: include
      in: query
      required: false
      schema:
        type: string
        example: workplaces
      description: >-
        Дополнительные данные, которые необходимо получить вместе со штатным
        сотрудником
    vacation_include:
      name: include
      in: query
      required: false
      schema:
        type: string
        example: agent,department,position,vacation_kind
      description: Вывод дополнительной информации
    candidate_include:
      name: include
      in: query
      required: false
      schema:
        type: string
        example: >-
          company,workplaces,status,checklist,agents,departments,positions,questionnaire,personal_data_processing_consent,requested_documents,requested_personal_data,eqes_issue_consent,eqes_issue_application
      description: Вывод дополнительной информации
    questionnaire_include:
      name: include
      in: query
      required: false
      schema:
        type: string
        example: >-
          company,candidate,status,personal_data_processing_consent,requested_documents,requested_personal_data,eqes_issue_consent,eqes_issue_application
      description: Вывод дополнительной информации
    identification_request_view:
      name: view
      in: query
      required: false
      schema:
        type: string
        enum:
          - simple
          - passport
      description: Вариант представления возвращаемых данных
    person-report-include:
      name: include
      in: query
      required: false
      schema:
        type: string
        example: >-
          suggested_readiness_at,readiness_progress,bankruptcy_partition,passport_partition,wanted_by_police_partition,wanted_by_penitentiary_partition,taxes_partition,terrorists_and_extremists_registry_partition,pledges_partition
      description: Вывод дополнительной информации об отчете о излице.
    vehicle-report-include:
      name: include
      in: query
      required: false
      schema:
        type: string
        example: >-
          is_partially_ready,readiness_progress,suggested_partial_readiness_at,created_at,vehicle_passport_partition,market_price_partition,vehicle_owners_partition,road_traffic_accidents_partition,commercial_using_partition,mileage_history_partition,traffic_police_restrictions_partition,wanted_partition,leasing_partition,ads_partition,arbitration_cases_partition,enforcement_proceedings_partition,pledges_partition,osago_partition,recall_campaigns_partition,fines_partition,url
      description: Вывод дополнительной информации в отчете о транспортном средстве

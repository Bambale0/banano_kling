components:
  securitySchemes:
    ApiKeyHeader:
      type: apiKey
      in: header
      name: Client-Key
    ApiKeyQuery:
      type: apiKey
      in: query
      name: client_key
  responses:
    400BadRequest:
      description: Неверный запрос
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              title: Неверный запрос
              detail: Неверный запрос.
              fields: null
              code: 400
    401Unauthorized:
      description: Ошибка авторизации
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              title: Ошибка авторизации
              detail: Требуется авторизация
              fields: null
              code: 401
    403Forbidden:
      description: Нет доступа к ресурсу
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              title: Доступ ограничен
              detail: This action is unauthorized.
              fields: null
              code: 403
    404NotFound:
      description: Ресурс не найден
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              title: Ошибка
              detail: Ресурс не найден
              fields: null
              code: 404
    422UnprocessableEntity:
      description: Ошибка валидации
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              title: Ошибка
              detail: The given data was invalid.
              fields:
                - field: name
                  messages:
                    - Поле Название обязательно для заполнения.
                - field: inn
                  messages:
                    - Поле ИНН обязательно для заполнения.
              code: 422
    429TooManyRequests:
      description: Превышен лимит запросов
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              title: Доступ ограничен
              detail: Превышен лимит запросов
              fields: null
              code: 429
    400BadRequest-2:
      description: Неверный запрос
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse-2'
          example:
            error:
              title: Неверный запрос
              detail: Неверный запрос
              fields: []
              code: 400
    401Unauthorized-2:
      description: Ошибка авторизации
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse-2'
          example:
            error:
              title: Ошибка авторизации
              detail: Требуется авторизация
              fields: []
              code: 401
    403Forbidden-2:
      description: Нет доступа к ресурсу
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse-2'
          example:
            error:
              title: Доступ ограничен
              detail: Доступ ограничен
              fields: []
              code: 403
    422UnprocessableEntity-2:
      description: Ошибка валидации
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse-2'
          example:
            error:
              title: Ошибка
              detail: Ошибка в переданных данных
              fields: []
              code: 422
    429TooManyRequests-2:
      description: Слишком много запросов
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse-2'
          example:
            error:
              title: Ошибка
              detail: Превышено количество обращений в api
              fields: []
              code: 429
    500InternalServerError:
      description: Неизвестная ошибка сервера
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse-2'
          example:
            error:
              title: Неизвестная ошибка сервера
              detail: Неизвестная ошибка сервера
              fields: []
              code: 500
    404NotFound-2:
      description: Ресурс не найден
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse-2'
          example:
            error:
              title: Ошибка
              detail: Ресурс не найден
              fields: []
              code: 404
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
